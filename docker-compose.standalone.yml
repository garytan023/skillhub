services:
  skillhub-app:
    image: node:22-alpine
    working_dir: /app
    command:
      - sh
      - -c
      - |
        set -eu
        if [ ! -f /app/server.js ]; then
          apk add --no-cache curl tar
          rm -rf /tmp/skillhub-src /tmp/skillhub.tar.gz
          mkdir -p /tmp/skillhub-src /app
          TARBALL_URL="https://github.com/garytan023/skillhub/archive/refs/heads/main.tar.gz"
          TARBALL_PROXY="https://ghproxy.com/https://github.com/garytan023/skillhub/archive/refs/heads/main.tar.gz"
          echo "Downloading skillhub source..."
          curl -sSL --retry 3 --retry-delay 3 --connect-timeout 30 --max-time 120 \
            -o /tmp/skillhub.tar.gz "$$TARBALL_URL" \
            || curl -sSL --retry 3 --retry-delay 3 --connect-timeout 30 --max-time 120 \
            -o /tmp/skillhub.tar.gz "$$TARBALL_PROXY"
          tar -xzf /tmp/skillhub.tar.gz -C /tmp/skillhub-src
          cp -a /tmp/skillhub-src/*/. /app/
          npm install --omit=dev
          rm -rf /tmp/skillhub-src /tmp/skillhub.tar.gz
        fi
        exec node server.js
    ports:
      - "4777:4777"
    environment:
      HOST: 0.0.0.0
      PORT: 4777
      NODE_ENV: production
      DATA_DIR: /data
      PACKAGE_DIR: /data/packages
      DATABASE_URL: postgres://skillhub:skillhub@postgres:5432/skillhub
      PUBLIC_BASE_URL: http://wppmd.xyz:4777
      SESSION_SECRET: change-me-long-random-string
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123456
      MAX_UPLOAD_MB: 25
      PUBLISH_BRANCH: main
      GITHUB_APP_ID: ""
      GITHUB_INSTALLATION_ID: ""
      GITHUB_APP_PRIVATE_KEY: ""
      GITHUB_APP_PRIVATE_KEY_PATH: ""
      PUBLISH_REPO: ""
    volumes:
      - skillhub_app:/app
      - skillhub_packages:/data/packages
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: skillhub
      POSTGRES_USER: skillhub
      POSTGRES_PASSWORD: skillhub
    volumes:
      - skillhub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillhub -d skillhub"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  skillhub_app:
  skillhub_postgres_data:
  skillhub_packages:
